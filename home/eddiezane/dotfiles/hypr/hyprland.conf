source = $HOME/.config/hypr/macchiato.conf

$mod = SUPER

monitor = , preferred, auto, auto
monitor = eDP-1, 2256x1504, 0x0, 1.333333

# monitor=,preferred,auto,1,mirror,eDP-1
# monitor = DP-7, preferred, auto, 1
# monitor = DP-8, preferred, auto-left, 1

env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

env = ELECTRON_OZONE_PLATFORM_HINT, auto

env = GDK_BACKEND, wayland, x11, *
env = SDL_VIDEODRIVER, wayland
env = CLUTTER_BACKEND, wayland

env = QT_QPA_PLATFORM, wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1

# SSH via 1Password's agent (matches home.sessionVariables; both for safety).
env = SSH_AUTH_SOCK, $HOME/.1password/agent.sock

# UWSM + graphical-session.target start hypridle, hyprpolkitagent, nm-applet,
# swaync, waybar, and yubikey-touch-detector via their upstream user units.
# Only things without a packaged systemd unit need an exec-once here.
exec-once = tailscale systray

$terminal = ghostty
$fileManager = thunar
$menu = wofi --show drun

input {
    kb_layout = us
    kb_options = caps:swapescape

    follow_mouse = 2
    mouse_refocus = false

    touchpad {
        natural_scroll = no
	    clickfinger_behavior = yes
	    scroll_factor = 0.2
	    disable_while_typing = false
	    tap-to-click = false
	    # drag_3fg = 1
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    gaps_in = 6
    gaps_out = 2
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    allow_tearing = false
}

binds {
    workspace_back_and_forth = yes
}

decoration {
    rounding = 0
    
    blur {
        enabled = false
        size = 3
        passes = 1
    }

    # https://wiki.hyprland.org/Configuring/Variables/#shadow
    shadow {
        enabled = false
    }

}

animations {
    enabled = no
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    # pseudotile = yes # master switch for pseudotiling. Enabling is bound to mod + P in the keybinds section below
    preserve_split = yes # you probably want this
    # no_gaps_when_only = true
    force_split = 2
    preserve_split = true
}

gesture = 4, horizontal, workspace
gestures {
    workspace_swipe_invert = false
    workspace_swipe_cancel_ratio = 0.2
}


group {
    groupbar {
        font_family = SauceCodePro Nerd Font
        font_size = 14
        gradients = false
        scrolling = false
        col.active = $pink
        col.inactive = $overlay2
    }
}

misc {
    focus_on_activate = 1
    force_default_wallpaper = 0
    disable_splash_rendering = 1
}

cursor {
    # Hardware cursors glitch on virtio-gpu and some real GPUs. Software
    # cursors have negligible cost on modern hardware.
    no_hardware_cursors = true
}

xwayland {
  force_zero_scaling = true
}

# App-specific workspace rules
windowrule = match:class Spotify, workspace 8 silent
windowrule = match:class slack, workspace 9 silent
windowrule = match:class signal, workspace 9 silent, no_initial_focus on
windowrule = match:class org.gnome.Calculator, float on
windowrule = match:class 1password, no_screen_share on
windowrule = match:class com.mitchellh.ghostty, focus_on_activate off

# https://wiki.hyprland.org/Configuring/Workspace-Rules/#smart-gaps
# Smart Borders / No Border on Solo (combining bordersize and rounding)
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = match:float false, match:workspace w[tv1], border_size 0, rounding 0
windowrule = match:float false, match:workspace f[1], border_size 0, rounding 0

# workspace=1, monitor:DP-3
# workspace=2, monitor:DP-3
# workspace=3, monitor:DP-3
bind = $mod, SPACE, movecurrentworkspacetomonitor, +1
# Clamshell mode. The system-level half is handled by systemd-logind:
# HandleLidSwitchDocked=ignore keeps the machine awake when docked, while
# HandleLidSwitch/HandleLidSwitchExternalPower=suspend-then-hibernate cover the
# undocked cases (see hosts/tehunicorn/default.nix). These binds only handle the
# remaining gap: blanking the internal panel when the lid closes while docked.
#
# lid.sh gates on dock state — docked closes disable eDP-1 (Hyprland migrates its
# workspaces onto the externals), undocked closes are a no-op so logind's
# suspend-then-hibernate runs without a racing monitor teardown. The IPC
# re-enable on lid-open is reliable via our local #14710 backstop patch
# (pkgs/hyprland/scheduleReload-doLater-backstop.patch). bindl fires even while
# locked / inhibited. switch:on = lid closed, switch:off = lid open.
bindl = , switch:on:Lid Switch,  exec, $HOME/.config/hypr/scripts/lid.sh close
bindl = , switch:off:Lid Switch, exec, $HOME/.config/hypr/scripts/lid.sh open

bind = $mod, RETURN, exec, $terminal
bind = $mod, E, exec, $fileManager
bind = $mod SHIFT, SPACE, togglefloating, 
bind = $mod, D, exec, $menu
bind = $mod SHIFT, E, exec, rofimoji -a clipboard

bind = $mod SHIFT, R, exec, hyprctl reload

bind = $mod, W, changegroupactive
bind = $mod SHIFT, W, togglegroup

bind = $mod, M, exec, killall -SIGUSR1 waybar
bind = $mod SHIFT, M, exec, $HOME/.config/hypr/scripts/bar.sh

bind = $mod SHIFT, Q, killactive
bind = $mod CONTROL, L, exec, loginctl lock-session
bind = $mod SHIFT, N, exec, swaync-client -t

bind = $mod CONTROL, N, exec, $HOME/.config/hypr/scripts/wlsunset.sh

bind = $mod CONTROL, backspace, exec, hyprctl dispatch dpms toggle

$brightness_script = $HOME/.config/hypr/scripts/brightness.sh
binde =, XF86MonBrightnessUp, exec, $brightness_script up
binde =, XF86MonBrightnessDown, exec, $brightness_script down
bind = $mod, XF86MonBrightnessUp, exec, $brightness_script max
bind = $mod, XF86MonBrightnessDown, exec, $brightness_script min

$volume_script = $HOME/.config/hypr/scripts/volume.sh
bindel =, XF86AudioRaiseVolume, exec, $volume_script up
bindel =, XF86AudioLowerVolume, exec, $volume_script down
bindel =, XF86AudioMute, exec, $volume_script mute
bindel = $mod, XF86AudioRaiseVolume, exec, $volume_script max
bindel = $mod, XF86AudioLowerVolume, exec, $volume_script min

bind = , XF86AudioPrev, exec, playerctl -p spotify previous
bind = , XF86AudioPlay, exec, playerctl -p spotify play-pause
bind = , XF86AudioNext, exec, playerctl -p spotify next
bind = $mod SHIFT, XF86AudioRaiseVolume, exec, playerctl -p spotify volume 0.1+
bind = $mod SHIFT, XF86AudioLowerVolume, exec, playerctl -p spotify volume 0.1-

bind = $mod, 0, exec, wlogout -s

# Screenshot
bind = $mod, Print, exec, grim - | satty --filename - 
bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" - | satty --filename -

# color picker
bind = $mod SHIFT, C, exec, hyprpicker -a

# Move focus with mod + arrow keys
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

bind = $mod SHIFT, h, movewindoworgroup, l
bind = $mod SHIFT, l, movewindoworgroup, r
bind = $mod SHIFT, k, movewindoworgroup, u
bind = $mod SHIFT, j, movewindoworgroup, d

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

bind = $mod, N, workspace, e+1
bind = $mod CONTROL, right, workspace, e+1
bind = $mod, P, workspace, e-1
bind = $mod CONTROL, left, workspace, e-1
bind = $mod, F, fullscreen
bind = $mod SHIFT, F, fullscreen, 1

bind = $mod, grave, togglespecialworkspace, scratch
bind = $mod SHIFT, grave, movetoworkspace, special:scratch
windowrule = match:workspace special:scratch, border_size 3, border_color rgb(ff00ff) rgb(8800ff) 45deg
workspace = special:scratch, gapsout:10

bind = $mod, equal, togglespecialworkspace, equal
bind = $mod SHIFT, equal, movetoworkspace, special:equal
windowrule = match:workspace special:equal, border_size 3, border_color rgb(292f56) rgb(005c8b) 45deg
workspace = special:equal, gapsout:10

bind = $mod, minus, togglespecialworkspace, minus
bind = $mod SHIFT, minus, movetoworkspace, special:minus
windowrule = match:workspace special:minus, border_size 3, border_color rgb(16e62d)
workspace = special:minus, gapsout:10

# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# HyprMod managed settings
# source = /home/eddiezane/.config/hypr/hyprland-gui.conf

# External multi-monitor setup.
# To use: uncomment the three lines below and comment out the eDP-1 / auto
# lines near the top of this file. Reverse to go back to laptop-only.
#
# Dell Alienware ultrawide - default, centered at origin
# monitor = desc:Dell Inc. AW3423DWF B99G2S3, 3440x1440@164.90Hz, 0x0, 1
# Samsung - to the left of the Dell
# monitor = desc:Samsung Electric Company LS24DG30X H8CY300680, 1920x1080@180.00Hz, -1920x0, 1
# Laptop - centered underneath the Dell
# monitor = desc:BOE 0x0BCA, 2256x1504@60.00Hz, 874x1440, 1.333333
